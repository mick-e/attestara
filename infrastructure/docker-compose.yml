services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: attestara
      POSTGRES_USER: attestara
      POSTGRES_PASSWORD: attestara_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - '5001:5001'
      - '8080:8080'
    volumes:
      - ipfs_data:/data/ipfs

volumes:
  postgres_data:
  ipfs_data:
